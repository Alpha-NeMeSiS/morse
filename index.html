<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traducteur Morse</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="app__header">
      <p class="eyebrow">Signal Station</p>
      <h1>Traducteur Morse</h1>
      <p>Encode du texte en Morse ou décode des signaux en message lisible.</p>
    </header>

    <section class="card">
      <div class="field-group">
        <label for="texte">Texte à encoder</label>
        <textarea id="texte" name="texte" placeholder="Ex: BONJOUR"></textarea>
      </div>

      <div class="actions">
        <button type="button" id="encodeBtn">Encoder ➜ Morse</button>
      </div>

      <div class="field-group">
        <label for="morse">Morse à décoder</label>
        <textarea id="morse" name="morse" placeholder="Ex: -... --- -. .--- --- ..- .-."></textarea>
      </div>

      <div class="actions">
        <button type="button" id="decodeBtn">Décoder ➜ Texte</button>
      </div>

      <div class="result" id="result" aria-live="polite">Résultat en attente…</div>
    </section>
  </main>

  <script>
    const result = document.getElementById('result');
    const texteInput = document.getElementById('texte');
    const morseInput = document.getElementById('morse');

    let encodeMap = null;
    let decodeMap = null;

    async function loadMorseCollection() {
      if (encodeMap && decodeMap) {
        return;
      }

      const response = await fetch('morse_collection.json');
      if (!response.ok) {
        throw new Error(`Impossible de charger la collection Morse (${response.status})`);
      }

      encodeMap = await response.json();
      decodeMap = Object.entries(encodeMap).reduce((acc, [char, symbol]) => {
        if (!(symbol in acc)) {
          acc[symbol] = char;
        }
        return acc;
      }, {});
    }

    function encodeText(input) {
      const chars = Array.from(input);
      return chars
        .map((char) => {
          if (char === ' ') {
            return '/';
          }

          const normalized = char.toLocaleUpperCase('fr-FR');
          return encodeMap[normalized] || '?';
        })
        .join(' ');
    }

    function normalizeDecodedCharacter(char) {
      if (/^[A-ZÀ-ÖØ-Þ]$/u.test(char)) {
        return char.toLocaleLowerCase('fr-FR');
      }
      return char;
    }

    function decodeText(input) {
      return input
        .trim()
        .split(/\s+/)
        .map((symbol) => {
          if (symbol === '/' || symbol === '|') {
            return ' ';
          }

          const decoded = decodeMap[symbol] || '?';
          return normalizeDecodedCharacter(decoded);
        })
        .join('');
    }

    async function runConversion(type) {
      result.textContent = 'Transmission en cours…';

      try {
        await loadMorseCollection();

        if (type === 'encode') {
          const texte = texteInput.value.trim();
          result.textContent = texte ? encodeText(texte) : 'Veuillez saisir un texte.';
          return;
        }

        const morse = morseInput.value.trim();
        result.textContent = morse ? decodeText(morse) : 'Veuillez saisir un code morse.';
      } catch (error) {
        result.textContent = `Erreur: ${error.message}`;
      }
    }

    document.getElementById('encodeBtn').addEventListener('click', () => runConversion('encode'));
    document.getElementById('decodeBtn').addEventListener('click', () => runConversion('decode'));
  </script>
</body>
</html>
